name: Backend tests

on:
  push:
    paths:
      - "epiweather-api/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "epiweather-api/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: epiweather-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v
